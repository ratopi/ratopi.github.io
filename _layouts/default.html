<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ site.title }}{% if page.title and page.title != site.title %} · {{ page.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="author" content="{{ site.author }}">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="site-nav">
    <div class="container">
      <a class="nav-brand" href="/">ratopi</a>
      <div class="nav-links">
        <a href="/blog">Blog</a>
        <a href="/updates">Updates</a>
        <a href="/projects">Projects</a>
        <a href="/about">About</a>
      </div>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-links">
        <a href="{{ site.github_url }}" title="GitHub">GitHub</a>
        <a href="{{ site.comments_url }}" title="Feedback">Feedback</a>
      </div>
      <p class="copyright">&copy; {{ site.author }} 2014–2026</p>
    </div>
  </footer>
</body>
</html>
