<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ site.title }}{% if page.title and page.title != site.title %} · {{ page.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="author" content="{{ site.author }}">
  <link rel="stylesheet" href="/css/style.css">
  {% feed_meta %}
</head>
<body>
  <nav class="site-nav">
    <div class="container">
      <a class="nav-brand" href="/">ratopi</a>
      <div class="nav-links">
        <a href="/blog">Blog</a>
        <a href="/updates">Updates</a>
        <a href="/projects">Projects</a>
        <a href="/about">About</a>
        <a href="{{ "/feed.xml" | relative_url }}" class="nav-feed" title="RSS Feed"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="6.18" cy="17.82" r="2.18"/><path d="M4 4.44v2.83c7.03 0 12.73 5.7 12.73 12.73h2.83c0-8.59-6.97-15.56-15.56-15.56zm0 5.66v2.83c3.9 0 7.07 3.17 7.07 7.07h2.83c0-5.47-4.43-9.9-9.9-9.9z"/></svg></a>
      </div>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-links">
        <a href="{{ site.github_url }}" title="GitHub">GitHub</a>
        <a href="{{ site.comments_url }}" title="Feedback">Feedback</a>
      </div>
      <p class="copyright">&copy; {{ site.author }} 2014–2026</p>
    </div>
  </footer>
</body>
</html>
