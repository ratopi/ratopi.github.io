---
layout: default
---
<article class="container post">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    {% if page.abstract %}<p class="post-abstract">{{ page.abstract }}</p>{% endif %}
    <p class="post-meta">{{ page.date | date: "%B %-d, %Y" }} · {{ page.author }}</p>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>
